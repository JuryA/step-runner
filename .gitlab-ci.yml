variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE/pipelines:$CI_PIPELINE_IID

stages:
  - test
  - build
  - e2e
  - deploy

go-fmt:
  stage: test
  image: golang:1.21
  script: |
    if [[ -n $(gofmt -l .) ]]; then
        gofmt -d .
        exit 1
    fi

go-lint:
  stage: test
  image: golangci/golangci-lint:v1.55.2
  script:
    - golangci-lint run -v

go-test:
  stage: test
  image: golang:1.21
  script:
    - go test ./...

go-integration:
  stage: test
  image: golang:1.21
  script:
    - go test -tags integration ./...

docker-build:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG

run-e2e:
  stage: e2e
  image: $IMAGE_TAG
  script:
    - /step-runner ci
  variables:
    STEPS:
      expand: false
      value: |
        - name: hello_world
          step: gitlab.com/gitlab-org/ci-cd/runner-tools/echo-step@master
          inputs:
            echo: ${CI_PIPELINE_ID}
        - name: ci_variables
          step: gitlab.com/gitlab-org/ci-cd/runner-tools/echo-step@master
          inputs:
            echo: "${{ job.CI_PIPELINE_ID }}"
  artifacts:
    paths:
      - step-results.json

verify-e2e:
  stage: e2e
  needs: ["run-e2e"]
  script:
    - apt update && apt install -y jq
    - if [[ $(jq -r '.childrenStepResults[0].outputs.echo' step-results.json) != $CI_PIPELINE_ID ]]; then exit 1 ; fi
    - if [[ $(jq -r '.childrenStepResults[1].outputs.echo' step-results.json) != $CI_PIPELINE_ID ]]; then exit 1 ; fi

docker-push:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $IMAGE_TAG
    - docker tag $IMAGE_TAG $CI_REGISTRY_IMAGE:v0
    - docker push $CI_REGISTRY_IMAGE:v0
