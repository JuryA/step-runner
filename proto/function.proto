syntax = "proto3";
package proto;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "../proto";

message Function {
  Signature signature = 1;
  Body body = 2;
}

message Signature {
  map<string,Input> inputs = 1;
  Outputs outputs = 2;
}

message Outputs {
  oneof outputs_oneof {
    Map outputs = 1;
    google.protobuf.Empty dynamic = 2;
    google.protobuf.Empty result = 3;
  }
  message Map {
    map<string,Output> outputs = 1;
  }
}

message Input {
  ValueType type = 1;
  bool sensitive = 3;
}

message Output {
  ValueType type = 1;
  bool sensitive = 3;
}

enum ValueType {
  value_type_unspecified = 0;
  string = 1;
  number = 2;
  boolean = 3;
  struct = 4;
  array = 5;
  function = 6;
  // bytes (by value)
  // oci (by reference)
}

message Body {
  oneof body_oneof {
    Exec exec = 1;
    Composition composition = 2;
  }
  Environment environment = 3;
}

message Environment {
  map<string,string> env = 1;
  map<string,google.protobuf.Value> scopes = 2;
  map<string,google.protobuf.Value> inputs = 3;
  map<string,google.protobuf.Value> outputs = 4;
  string work_dir = 5;
  string step_dir = 6;
  map<string,google.protobuf.Value> exports = 7;
}

message Exec {
  repeated string command = 1;
  int32 exit_code = 2;
}

message Composition {
  repeated Invocation invocations = 1;
}

message Invocation {
  Reference reference = 1;
  Environment environment = 2;
  Result result = 3;
}

message Reference {
  oneof reference_oneof {
    Local local = 1;
    Git git = 2;
    Oci oci = 3;
    Dist dist = 4;
  }
  message Local {
    repeated string path = 1;
    string filename = 2;
  }
  message Git {
    string repository = 1;
    repeated string path = 2;
    string filename = 3;
    string commit = 4;
    string tag = 5;
  }
  message Oci {
    string registry = 1;
    repeated string path = 2;
    string hash = 3;
    string tag = 4;
  }
  message Dist {
    repeated path = 1;
    string filename = 2;
  }
}

message Result {
  Function before = 1;
  Function after = 2;
}