spec:
  inputs:
    registry:
      type: string
    repository:
      type: string
    tag:
      type: string
  outputs:
    download_dir:
      type: string
    ref:
      type: string
---
exec:
  command:
    - "${{step_dir}}/run"
    - "--registry"
    - "${{inputs.registry}}"
    - "--repository"
    - "${{inputs.repository}}"
    - "--tag"
    - "${{inputs.tag}}"
    - "--output_file"
    - "${{output_file}}"
