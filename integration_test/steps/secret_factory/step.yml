spec:
  inputs:
    secret_override:
      type: string
      default: ""
      sensitive: true
  outputs:
    secret:
      type: string
      sensitive: true
---
env:
  OUTPUT: ${{ inputs.secret_override }}
exec:
  command: [bash, -c, 'SECRET=${{ inputs.secret_override }}; SECRET=${SECRET:-$RANDOM}; echo "{\"name\":\"secret\",\"value\":\"${SECRET}\"}" >${{ output_file }}']
