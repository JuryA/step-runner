spec:
  inputs: {}
  outputs:
    crew_name_1:
      default: nobody
    crew_name_2:
      default: nobody
---
steps:
  - name: greet_sponge_bob
    step: ./test_steps/greeting
    inputs:
      name: sponge bob
      age: 5
      favorites:
        pants: square
  - name: greet_patrick_star
    step: ./test_steps/greeting
    inputs:
      name: patrick star
      age: 7
      hungry: true
outputs:
  crew_name_1: ${{steps.greet_sponge_bob.outputs.name}}
  crew_name_2: ${{steps.greet_patrick_star.outputs.name}}
