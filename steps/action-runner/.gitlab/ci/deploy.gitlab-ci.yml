
actions docker-push:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  image: docker:${DOCKER_VERSION}
  services:
    - docker:${DOCKER_VERSION}-dind
  script:
    - cd $WORKING_DIR
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $ACTION_IMAGE_TAG
    - docker tag $ACTION_IMAGE_TAG $CI_REGISTRY_IMAGE:$IMAGE_VERSION
    - docker push $ACTION_DEPLOY_IMAGE:$IMAGE_VERSION
