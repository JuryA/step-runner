

actions run-e2e:
  stage: e2e
  image: $LEGACY_IMAGE_TAG
  script:
    - /step-runner ci --write-steps-results
  variables:
    STEPS: |
      - name: echo_test
        step: $WORKING_DIR
        env:
          ECHO: hello actions
        inputs:
          action: $WORKING_DIR/test/actions/echo
          action_runner_image: ${ACTION_IMAGE_TAG}
          inputs: {}
      - name: test_yq
        step: $WORKING_DIR
        inputs:
          action: mikefarah/yq@master
          action_runner_image: ${ACTION_IMAGE_TAG}
          inputs:
            cmd: yq .messages[0] ${CI_PROJECT_DIR}/${WORKING_DIR}/test/data/hello-world.yml
      - name: test_trufflehog
        step: $WORKING_DIR
        inputs:
          action: trufflesecurity/trufflehog@main
          action_runner_image: ${ACTION_IMAGE_TAG}
          inputs:
            extra_args: --only-verified
    TMPDIR: /builds
    DOCKER_HOST: tcp://docker:2375
  services:
    - docker:${DOCKER_VERSION}-dind
  artifacts:
    when: always
    paths:
      - step-results.json

actions verify-e2e:
  stage: e2e
  image: alpine:3.20
  needs: ["actions run-e2e"]
  script:
    - apk add jq
    - if [[ $(jq -r '.subStepResults[0].outputs.echo' step-results.json) != "hello actions" ]]; then exit 1 ; fi
    - if [[ $(jq -r '.subStepResults[1].outputs.result' step-results.json) != "hello world" ]]; then exit 1 ; fi
