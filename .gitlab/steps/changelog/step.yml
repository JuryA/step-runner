spec:
  inputs:
    changelog:
      type: string
      default: "CHANGELOG.md"
    echo_latest:
      type: boolean
      default: false
  outputs:
    version:
      type: string
    major:
      type: string
    major_minor:
      type: string
    major_minor_patch:
      type: string
    changes:
      type: string
---
env:
  GOLANG_VERSION: 1.22.5
  GOTOOLCHAIN: local
  PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  GOPATH: /go
  HOME: /root
exec:
  work_dir: ${{step_dir}}
  command:
    - go
    - run
    - .
    - --changelog=${{inputs.changelog}}
    - --echo_latest=${{inputs.echo_latest}}
    - --output_file=${{output_file}}
