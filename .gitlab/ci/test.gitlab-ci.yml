
go-fmt:
  stage: test
  image: golang:$GO_VERSION
  script:
    - make go-fmt
    - git diff --exit-code

go-lint:
  stage: test
  image: golang:${GO_VERSION}-alpine
  script:
    - apk add git make
    - make go-lint

check-generated:
  stage: test
  image: golang:${GO_VERSION}
  before_script:
    - apt update
    - apt install --assume-yes --no-install-recommends unzip
  script:
    - make check-generated

go-test:
  stage: test
  image: golang:${GO_VERSION}
  before_script:
    - apt update
    - apt install --assume-yes --no-install-recommends unzip
  script:
    - make test
  artifacts:
    when: always
    reports:
      junit: [report.xml, builtin/steps/**/report.xml, .gitlab/steps/**/report.xml]

changelog-format:
  stage: test
  image: registry.gitlab.com/gitlab-org/step-runner:v0
  run:
    - name: changelog
      step: ./.gitlab/steps/changelog
      inputs:
        changelog: "${{job.CI_PROJECT_DIR}}/CHANGELOG.md"
        echo_latest: true
