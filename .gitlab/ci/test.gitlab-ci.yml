
go-deps:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - make go-deps
    - git diff --exit-code

go-fmt:
  stage: test
  image: golang:$GO_VERSION
  script:
    - make go-fmt
    - git diff --exit-code

go-lint:
  stage: test
  image: golang:${GO_VERSION}-alpine
  script:
    - apk add git make
    - make go-lint

terraform-fmt:
  stage: test
  image:
    name: hashicorp/terraform:${TERRAFORM_VERSION}
    entrypoint: [""]
  script:
    - apk add git make
    - make tf-fmt

terraform-lint:
  stage: test
  image:
    name: hashicorp/terraform:${TERRAFORM_VERSION}
    entrypoint: [""]
  script:
    # go isn't used during linting, so let's not worry about the version.
    - apk add git make curl go
    - make tf-lint

check-generated:
  stage: test
  image: golang:${GO_VERSION}
  before_script:
    - apt update
    - apt install --assume-yes --no-install-recommends unzip
  script:
    - make check-generated

go-test:
  stage: test
  image: golang:${GO_VERSION}
  before_script:
    - apt update
    - apt install --assume-yes --no-install-recommends unzip
  script:
    - make test
  artifacts:
    when: always
    reports:
      junit: [report.xml, dist/steps/**/report.xml, .gitlab/steps/**/report.xml]

changelog-format:
  stage: test
  image: registry.gitlab.com/gitlab-org/step-runner:v0
  run:
    - name: changelog
      step: ./.gitlab/steps/changelog
      inputs:
        changelog: "${{job.CI_PROJECT_DIR}}/CHANGELOG.md"
        echo_latest: true
