
# for those tests that use the GitLab Runner deployed
# as part of the Step Runner pipeline (uses step-runner image created in pipeline)
.e2e:use-pipeline-runner:
  stage: e2e
  tags: ["steps-e2e-${CI_PIPELINE_IID}"]
  timeout: 10m  # we want jobs to eventually finish so runners get cleaned up

e2e:script:run:
  extends: .e2e:use-pipeline-runner
  image: alpine:${ALPINE_VERSION}
  run:
    - name: echo_pipeline
      script: echo ${{job.CI_PIPELINE_ID}} >${{job.CI_PROJECT_DIR}}/output.txt
  artifacts:
    paths:
      - output.txt

e2e:script:verify:
  stage: e2e
  image: alpine:${ALPINE_VERSION}
  needs: ["e2e:script:run"]
  script:
    - ECHO_MESSAGE=$(cat output.txt)
    - "[ $ECHO_MESSAGE == $CI_PIPELINE_ID ]"

e2e:image-version:
  stage: e2e
  image: alpine:${ALPINE_VERSION}
  tags: ["saas-${OS}-medium-${ARCH}"]
  parallel:
    matrix:
      - OS: linux
        ARCH: amd64
      - OS: linux
        ARCH: arm64
  script:
    - STEP_RUNNER_HELP=$(./out/bin/step-runner-${OS}-${ARCH} help)
    - echo "$STEP_RUNNER_HELP"
    - echo "$STEP_RUNNER_HELP" | grep -q "Step Runner version:" # expect version to be printed
    - echo "$STEP_RUNNER_HELP" | grep -q -v "UNKNOWN" # version should be known

##### Legacy Image tests

e2e:action:
  stage: e2e
  image: $LEGACY_IMAGE_TAG
  services:
    - docker:${DOCKER_VERSION}-dind
  variables:
    TMPDIR: /builds
    DOCKER_HOST: tcp://docker:2375
  run:
    - name: say_hi
      step:
        git:
          url: gitlab.com/components/action-runner
          rev: main
      inputs:
        action: mikefarah/yq@master
        action_runner_image: registry.gitlab.com/components/action-runner:v0
        inputs:
          cmd: echo ["Hi, ${{job.CI_PROJECT_NAME}}!"] | yq .[0]
  artifacts:
    access: developer
    when: always
    paths:
      - step-results.json

e2e:legacy:run:
  stage: e2e
  image: $LEGACY_IMAGE_TAG
  variables:
    CI_STEPS_DEBUG: "true"
  run:
    - name: ci_variables
      step: gitlab.com/gitlab-org/ci-cd/runner-tools/echo-step@main
      inputs:
        echo: "${{job.CI_PIPELINE_ID}}"
  artifacts:
    access: developer
    when: always
    paths:
      - step-results.json

e2e:legacy:verify:
  stage: e2e
  image: alpine:${ALPINE_VERSION}
  needs: ["e2e:legacy:run"]
  script:
    - apk add jq
    - ECHO_MESSAGE=$(jq -r '.subStepResults[0].outputs.echo' step-results.json)
    - "[ $ECHO_MESSAGE == $CI_PIPELINE_ID ]"
