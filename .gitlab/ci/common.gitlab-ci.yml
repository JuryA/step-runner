
variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE/pipelines:$CI_PIPELINE_IID
  LEGACY_IMAGE_TAG: ${IMAGE_TAG}-legacy
  GO_VERSION: 1.22
  DOCKER_VERSION: 27.3.1

.go-cache:
  variables:
    GOCACHE: $CI_PROJECT_DIR/.gocache
  before_script:
    - mkdir -p "${GOCACHE}"
  cache:
    paths:
      - "${GOCACHE}"
    key: "${CI_JOB_NAME_SLUG}"
