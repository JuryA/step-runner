
docker-push:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $IMAGE_TAG
    - docker tag $IMAGE_TAG $CI_REGISTRY_IMAGE:v0
    - docker push $CI_REGISTRY_IMAGE:v0

release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/step-runner:v0
  run:
    - name: changelog
      step: ./.gitlab/steps/changelog
      inputs:
        changelog: "${{job.CI_PROJECT_DIR}}/CHANGELOG.md"
    - name: verify works
      step: gitlab.com/gitlab-org/ci-cd/runner-tools/echo-step@v3
      inputs:
        echo: "version: ${{steps.changelog.outputs.latest_version}}, major: ${{steps.changelog.outputs.latest_major}}, minor: ${{steps.changelog.outputs.latest_minor}}, patch: ${{steps.changelog.outputs.latest_patch}}, date: ${{steps.changelog.outputs.latest_date}}, changes: ${{steps.changelog.outputs.latest_changes}}"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
