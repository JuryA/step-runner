
docker image:
  stage: build docker
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  dependencies:
    - "binaries: [linux/amd64 linux/arm64]"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
