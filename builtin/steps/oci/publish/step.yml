spec:
  inputs:
    registry:
      type: string
    repository:
      type: string
    tag:
      type: string
    common:
      type: struct
      default: {}
    platforms:
      type: struct
      default: {}
  outputs:
    registry:
      type: string
    repository:
      type: string
    tag:
      type: string
    ref:
      type: string
    digest:
      type: struct
---
exec:
  work_dir: ${{step_dir}}
  command:
    - "${{step_dir}}/run"
    - "--registry"
    - "${{inputs.registry}}"
    - "--repository"
    - "${{inputs.repository}}"
    - "--tag"
    - "${{inputs.tag}}"
    - "--common"
    - "${{inputs.common}}"
    - "--platforms"
    - "${{inputs.platforms}}"
    - "--output_file"
    - "${{output_file}}"
